services:
  postgres:
    image: postgres:15-alpine
    container_name: tgapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp_db
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c listen_addresses=*
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d myapp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    profiles: ["tools"]
    image: flyway/flyway:10-alpine
    container_name: tgapp_migrate
    command: >
      -url=jdbc:postgresql://postgres:5432/myapp_db
      -user=postgres
      -password=postgres
      -locations=filesystem:/flyway/sql
      -connectRetries=10
      migrate
    volumes:
      - ./internal/migrations:/flyway/sql
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: